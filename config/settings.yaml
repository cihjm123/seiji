# 전체 프로젝트 설정

# LLM 설정
llm:
  provider: "ollama"
  model: "llama3.1:8b"
  base_url: "http://localhost:11434"
  temperature: 0.7
  max_tokens: 2048
  context_window: 4096

# 경로 설정
paths:
  vectordb: "./data/vectordb"
  conversations: "./data/conversations"
  raw_documents: "/mnt/d/ai-project/documents"
  datasets: "/mnt/d/ai-project/datasets"
  logs: "/mnt/d/ai-project/logs"

# API 서버 설정
api:
  host: "0.0.0.0"
  port: 8000
